<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="520" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="520" height="380" fill="url(#bg)" rx="12"/>
  <!-- House -->
  <polygon points="200,80 320,80 360,130 160,130" fill="#0f766e"/>
  <rect x="170" y="130" width="180" height="140" fill="#0f766e"/>
  <!-- Door -->
  <rect x="240" y="200" width="40" height="70" fill="#99f6e4" rx="4"/>
  <circle cx="274" cy="238" r="3" fill="#0d9488"/>
  <!-- Windows -->
  <rect x="185" y="150" width="35" height="35" fill="#99f6e4" rx="3"/>
  <rect x="300" y="150" width="35" height="35" fill="#99f6e4" rx="3"/>
  <!-- Window cross -->
  <line x1="202" y1="150" x2="202" y2="185" stroke="#0f766e" stroke-width="2"/>
  <line x1="185" y1="167" x2="220" y2="167" stroke="#0f766e" stroke-width="2"/>
  <line x1="317" y1="150" x2="317" y2="185" stroke="#0f766e" stroke-width="2"/>
  <line x1="300" y1="167" x2="335" y2="167" stroke="#0f766e" stroke-width="2"/>
  <!-- Person (therapist) -->
  <circle cx="390" cy="165" r="22" fill="#5eead4"/>
  <!-- Head -->
  <circle cx="390" cy="165" r="14" fill="#ccfbf1"/>
  <!-- Body -->
  <rect x="378" y="180" width="24" height="40" fill="#5eead4" rx="4"/>
  <!-- Arms -->
  <line x1="378" y1="190" x2="355" y2="210" stroke="#5eead4" stroke-width="8" stroke-linecap="round"/>
  <line x1="402" y1="190" x2="410" y2="215" stroke="#5eead4" stroke-width="8" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="383" y1="220" x2="375" y2="260" stroke="#5eead4" stroke-width="8" stroke-linecap="round"/>
  <line x1="397" y1="220" x2="405" y2="260" stroke="#5eead4" stroke-width="8" stroke-linecap="round"/>
  <!-- Bag/kit -->
  <rect x="340" y="205" width="20" height="16" fill="#f97316" rx="3"/>
  <line x1="348" y1="205" x2="348" y2="200" stroke="#f97316" stroke-width="2"/>
  <line x1="354" y1="205" x2="354" y2="200" stroke="#f97316" stroke-width="2"/>
  <line x1="343" y1="213" x2="357" y2="213" stroke="#fff" stroke-width="2"/>
  <line x1="350" y1="207" x2="350" y2="219" stroke="#fff" stroke-width="2"/>
  <!-- Ground -->
  <rect x="140" y="270" width="240" height="6" fill="#0f766e" rx="3"/>
  <!-- Medical cross badge -->
  <circle cx="80" cy="80" r="30" fill="rgba(255,255,255,0.12)"/>
  <rect x="74" y="65" width="12" height="30" fill="#99f6e4" rx="2"/>
  <rect x="65" y="74" width="30" height="12" fill="#99f6e4" rx="2"/>
  <!-- Decorative circles -->
  <circle cx="460" cy="50" r="40" fill="rgba(255,255,255,0.06)"/>
  <circle cx="60" cy="320" r="50" fill="rgba(255,255,255,0.05)"/>
  <circle cx="460" cy="330" r="25" fill="rgba(255,255,255,0.08)"/>
  <!-- Heartbeat line -->
  <polyline points="80,180 100,180 110,155 120,205 130,165 145,180 520,180" fill="none" stroke="rgba(153,246,228,0.25)" stroke-width="2"/>
</svg>
