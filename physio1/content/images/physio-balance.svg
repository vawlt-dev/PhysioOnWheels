<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#f0fdfa" rx="16"/>
  <!-- Balance beam/platform -->
  <rect x="80" y="240" width="140" height="10" fill="#0d9488" rx="5"/>
  <rect x="140" y="220" width="20" height="22" fill="#0f766e" rx="3"/>
  <!-- Person standing on one leg -->
  <!-- Torso -->
  <rect x="134" y="155" width="32" height="50" fill="#0d9488" rx="8"/>
  <!-- Head -->
  <circle cx="150" cy="140" r="18" fill="#5eead4"/>
  <!-- Hair -->
  <path d="M135,132 Q150,120 165,132" fill="#0f766e"/>
  <!-- Standing leg -->
  <line x1="145" y1="205" x2="143" y2="242" stroke="#0d9488" stroke-width="14" stroke-linecap="round"/>
  <!-- Raised leg (balance) -->
  <line x1="155" y1="205" x2="175" y2="230" stroke="#0d9488" stroke-width="14" stroke-linecap="round"/>
  <line x1="175" y1="230" x2="190" y2="215" stroke="#0d9488" stroke-width="12" stroke-linecap="round"/>
  <!-- Arms out for balance -->
  <line x1="134" y1="170" x2="100" y2="185" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
  <line x1="166" y1="170" x2="200" y2="185" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="98" cy="186" r="7" fill="#5eead4"/>
  <circle cx="202" cy="186" r="7" fill="#5eead4"/>
  <!-- Motion lines -->
  <line x1="108" y1="195" x2="95" y2="200" stroke="#0d9488" stroke-width="2" opacity="0.4" stroke-dasharray="3,2"/>
  <line x1="192" y1="195" x2="205" y2="200" stroke="#0d9488" stroke-width="2" opacity="0.4" stroke-dasharray="3,2"/>
  <text x="150" y="278" font-family="Arial" font-size="13" fill="#0f766e" text-anchor="middle" font-weight="bold">Balance & Falls Prevention</text>
</svg>
